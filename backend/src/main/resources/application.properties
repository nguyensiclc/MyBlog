spring.datasource.url=jdbc:postgresql://localhost:5432/myblog
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

server.port=8080

jwt.secret=change-this-secret-in-production-please-keep-it-long
jwt.expiration-seconds=36000

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG

# DevTools: auto-restart when code changes (after compile)
spring.devtools.restart.enabled=true

# Avatar upload directory (relative to working dir); served at /uploads/**
app.upload-dir=./uploads

# CORS allowed origins (comma-separated). On AWS, set in EC2 config to e.g. http://<public-ip>:8080
# app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Max multipart file size (default 1MB can cause 413 when exceeded)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Tomcat POST limit (bytes); must allow at least the same as max-request-size
server.tomcat.max-http-post-size=10485760
server.tomcat.max-swallow-size=10MB

